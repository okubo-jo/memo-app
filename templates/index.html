<!DOCTYPE html>
<html>
<head>
<title>メモ帳アプリ</title>
</head>
<body>

<h1>メモ帳アプリ</h1>

<form method="POST">
<textarea name="memo" rows="4" cols="40"></textarea><br>
<button type="submit">保存</button>
</form>

<h2>メモ一覧</h2>

<ul>
{% for memo in memos %}
<li>
{{ memo }}
<a href="/delete/{{ loop.index0 }}" onclick="return confirm('本当に削除しますか？')">削除</a>
</li>
{% endfor %}
</ul>

</body>
</html>
